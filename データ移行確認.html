<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>データ移行確認</title><link rel="stylesheet" href="業務基盤.css"></head><body><header><div class="head"><div><h1>安全なデータ移行</h1><div>まず保存、次に差分確認。元データは消しません。</div></div><a href="業務フロー.html">業務フロー</a></div></header><main><section class="panel"><div class="toolbar"><button class="btn primary" id="backup">この端末をバックアップ</button><label class="btn secondary">他端末のバックアップを比較<input class="hidden" id="compare" type="file" accept=".json"></label><span class="status" id="status">未実行</span></div><p class="notice">社員PC・スマホなど全端末で実行してください。dry-runでは書き込みを行わず、件数・金額・業者名の重複候補だけを表示します。</p><div id="report"></div></section></main><script src="業務基盤.js"></script><script>backup.onclick=()=>{const d=exportLegacySnapshot();status.textContent='バックアップ保存済み';report.innerHTML=`<p>端末ID: ${escapeHtml(d.device_id)}</p><p>対象キー: ${Object.keys(d.items).length}件</p>`};compare.onchange=()=>previewImport(compare.files[0],(e,d)=>{status.textContent=e?'読込エラー':'比較準備完了（DB書込なし）';report.textContent=e?e.message:`取得日時: ${d.exported_at||'不明'} / 端末: ${d.device_id||'不明'}`})</script></body></html>

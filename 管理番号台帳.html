<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#163b6d">
  <title>イズミ装美 管理番号台帳</title>
  <link rel="stylesheet" href="台帳共通.css?v=20260723-UX27">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <header>
    <div><h1>イズミ装美　管理番号台帳</h1><div class="sub">会議チェックと管理番号を固定・入力内容は自動保存</div></div>
    <div id="userBox" class="user hidden">
      <nav class="nav"><a href="index.html">番号取得</a><a href="工事リスト.html">一覧メニュー</a><a href="estimate.html">見積を開く</a><a href="工事リスト・原価.html">原価</a><a href="工事リスト・未発注.html">未発注</a><a href="請求.html">請求</a></nav>
      <span id="userEmail"></span><button class="logout" onclick="signOut()">ログアウト</button>
    </div>
  </header>
  <section id="loginCard" class="login">
    <h2>社員ログイン</h2><div>全社員が閲覧・修正できます。削除は2回確認後に実行され、管理番号は再利用されません。</div>
    <label>メールアドレス</label><input id="email" type="email" autocomplete="email">
    <label>パスワード</label><input id="password" type="password" autocomplete="current-password">
    <button class="primary" style="width:100%;margin-top:12px" onclick="signIn()">ログイン</button>
    <div id="loginStatus" class="status"></div>
  </section>
  <main id="app" class="hidden">
    <section class="controls">
      <div class="toolbar">
        <div class="field year"><label>年度</label><select id="yearFilter"><option value="">すべて</option><option value="23">2023年度</option><option value="24">2024年度</option><option value="25">2025年度</option><option value="26">2026年度</option><option value="27">2027年度</option><option value="28">2028年度</option><option value="29">2029年度</option><option value="30">2030年度</option></select></div>
        <div class="field search"><label>検索</label><input id="search" placeholder="番号・担当者・物件・請求先"></div>
        <div class="field zoom"><label>縮尺</label><select id="zoom"><option value=".7">70%</option><option value=".8">80%</option><option value=".9">90%</option><option value="1" selected>100%</option><option value="1.1">110%</option></select></div>
        <button class="secondary" onclick="clearSearch()">解除</button><button class="secondary" onclick="loadData()">更新</button><button class="primary" onclick="downloadCsv()">CSV</button>
        <span class="excel-help">範囲選択・コピー＆貼り付け・⌘Dで下方向コピー・Enterで次の行</span>
      </div>
      <div id="summary" class="summary"></div><div id="ledgerStatus" class="status"></div>
    </section>
    <section class="sheet-area"><div class="table-wrap"><div class="sheet-scale"><table><thead id="ledgerHead"></thead><tbody id="ledgerBody"></tbody></table></div></div></section>
  </main>
  <script>
    window.LEDGER_CONFIG={
      viewKey:'management',title:'管理番号台帳',allowDelete:true,
      fields:[
        {key:'management_number',label:'管理番号',type:'text',width:'w-number',locked:true},
        {key:'reception_date',label:'受付日',type:'date',width:'w-date'},
        {key:'staff_name',label:'工事担当者',type:'staff',width:'w-staff'},
        {key:'property_name',label:'物件名',type:'text',width:'w-property'},
        {key:'work_name',label:'作業件名',type:'text',width:'w-work'},
        {key:'scheduled_completion_date',label:'完工予定日',type:'date',width:'w-date'},
        {key:'completed_on',label:'完工日',type:'date',width:'w-date'},
        {key:'accounting_month',label:'計上月',type:'month',width:'w-month'},
        {key:'invoice_date',label:'請求書',type:'date',width:'w-date'},
        {key:'customer_name',label:'得意先',type:'text',width:'w-client'},
        {key:'customer_contact_name',label:'得意先<br>担当者',type:'text',width:'w-staff'},
        {key:'sales_estimate_ex_tax',label:'売上）見積<br>（税抜）',type:'money',width:'w-money'},
        {key:'landlord_burden_ex_tax',label:'貸主負担<br>（税抜）',type:'money',width:'w-money'},
        {key:'tenant_burden_ex_tax',label:'借主負担<br>（税抜）',type:'money',width:'w-money'},
        {key:'sales_invoice_tax_in',label:'請求金額<br>（税込）',type:'money',width:'w-money'},
        {key:'parking_expense',label:'駐車場等<br>実費',type:'money',width:'w-money'},
        {key:'payment_received_on',label:'入金日',type:'date',width:'w-date'},
        {key:'notes',label:'備考',type:'text',width:'w-note'},
        {key:'fee_amount',label:'手数料',type:'money',width:'w-money'},
        {key:'closing_sales_accounting_month',label:'締め後売上<br>計上月',type:'month',width:'w-month'},
        {key:'accounting_year',label:'計上年度',type:'fiscalYear',width:'w-year'}
      ],
      summaries:[
        {label:'表示件数',type:'count'},{label:'売上見積（税抜）',key:'sales_estimate_ex_tax'},
        {label:'売上請求（税込）',key:'sales_invoice_tax_in'},{label:'手数料',key:'fee_amount'}
      ]
    };
  </script>
  <script src="台帳共通.js?v=20260723-UX28"></script>
<script src="見積作業タブ.js?v=20260722"></script>
</body>
</html>

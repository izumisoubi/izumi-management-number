<!doctype html>
<html lang="ja">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><meta name="referrer" content="no-referrer"><meta name="theme-color" content="#173e70"><title>イズミ装美 追加・変更工事申請</title><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><link rel="stylesheet" href="業務基盤.css?v=20260724-UX37"><style>main{max-width:720px}.hero{padding:18px;border-radius:14px;background:linear-gradient(135deg,#173e70,#2868d8);color:#fff}.lines{width:100%;border-collapse:collapse}.lines th,.lines td{padding:8px;border-bottom:1px solid #d7e0ee;font-size:11px;text-align:left}.num{text-align:right}.hidden{display:none!important}@media(max-width:600px){main{padding:12px}.panel{padding:14px}}</style></head>
<body><header><div class="head"><div><h1>株式会社イズミ装美</h1><div>追加・変更工事の事前申請</div></div></div></header><main><section id="loading" class="panel">発注内容を確認しています…</section><section id="error" class="panel hidden"><h2>申請できません</h2><p id="errorText"></p></section><section id="app" class="hidden"><div class="hero"><small id="poNo"></small><h2 id="vendor"></h2><div id="project"></div></div><section class="panel"><h3>現在の発注内容</h3><div style="overflow:auto"><table class="lines"><thead><tr><th>内容</th><th>数量</th><th>単位</th><th>金額</th></tr></thead><tbody id="lines"></tbody></table></div></section><section class="panel"><h3>追加・変更内容</h3><label>理由（必須）<input id="reason" placeholder="例：下地劣化により補修が必要"></label><label>詳しい作業内容<textarea id="detail" placeholder="施工前に、内容・数量・現場状況を入力してください"></textarea></label><label>増減金額（税抜）<input id="amount" inputmode="numeric" placeholder="減額は -5000 のように入力"></label><p class="notice">申請だけでは着工承認になりません。イズミ装美が変更注文を承認した後に施工してください。</p><button id="submit" class="btn primary" onclick="submitRequest()">変更申請を送信</button><div id="status" class="status"></div></section></section><section id="done" class="panel hidden"><h2>変更申請を受け付けました</h2><p id="doneText"></p><p>イズミ装美の承認連絡を待ってから施工してください。</p></section></main>
<script>
const db=window.supabase.createClient('https://jjowjnrsknmakcunblzq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqb3dqbnJza25tYWtjdW5ibHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNzY4MjUsImV4cCI6MjA5OTg1MjgyNX0.XYPEt90GQlzJMTe67f9O7WExNYrJhfQ_HC20kkCWgGs'),$=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),yen=v=>'¥'+Math.round(Number(v)||0).toLocaleString('ja-JP');let token='',submitting=false;
function readToken(){const hash=new URLSearchParams(location.hash.replace(/^#/,'')),query=new URLSearchParams(location.search),value=hash.get('token')||query.get('token')||'';if(query.has('token'))history.replaceState(null,'',location.pathname+'#token='+encodeURIComponent(value));return value}
function fail(message){$('loading').classList.add('hidden');$('app').classList.add('hidden');$('error').classList.remove('hidden');$('errorText').textContent=message}
async function load(){token=readToken();if(!token)return fail('申請用トークンがありません。');const result=await db.rpc('get_purchase_order_for_change_token',{p_token:token});if(result.error)return fail(result.error.message);const data=result.data;$('poNo').textContent=`発注番号 ${data.po_no}`;$('vendor').textContent=`${data.vendor_name} 御中`;$('project').textContent=`${data.management_number}　${data.property_name||''}　${data.work_name||''}`;$('lines').innerHTML=(data.lines||[]).map(line=>`<tr><td>${esc(line.description)}</td><td>${Number(line.quantity)}</td><td>${esc(line.unit)}</td><td class="num">${yen(line.amount)}</td></tr>`).join('');$('loading').classList.add('hidden');$('app').classList.remove('hidden')}
async function submitRequest(){const reason=$('reason').value.trim(),detail=$('detail').value.trim(),amountText=String($('amount').value).replace(/[,，¥￥\s]/g,''),amount=Number(amountText);if(!reason||amountText===''||!Number.isFinite(amount)){$('status').textContent='理由と増減金額を入力してください。減額はマイナスで入力できます。';return}if(submitting)return;submitting=true;$('submit').disabled=true;$('status').textContent='送信中…';const result=await db.functions.invoke('co-request',{body:{token,reason,detail,amount,tax_rate:.1}});if(result.error||result.data?.error){submitting=false;$('submit').disabled=false;$('status').textContent=result.data?.error||result.error.message;return}$('app').classList.add('hidden');$('done').classList.remove('hidden');$('doneText').textContent=`変更注文番号 ${result.data.co_no} として記録しました。`}
load();
</script></body></html>

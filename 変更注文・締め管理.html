<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="theme-color" content="#173e70"><title>イズミ装美 変更注文・締め管理</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="stylesheet" href="業務基盤.css?v=20260724-UX36">
  <style>
    main{max-width:1200px}.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.kpi{padding:18px;border:1px solid #d8e1ed;border-radius:12px;background:#fff}.kpi strong{display:block;font-size:36px;color:#173e70}.kpi.ok{border-color:#9ed7ba;background:#effaf4}.kpi.warn{border-color:#f1bd75;background:#fff8eb}.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.table-scroll{overflow:auto}table{width:100%;border-collapse:collapse;min-width:700px}th,td{padding:8px;border-bottom:1px solid #d8e1ed;text-align:left;font-size:11px}th{background:#eef3f9}.num{text-align:right}.row-actions{display:flex;gap:6px}.row-actions button{padding:6px 9px}.create-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:8px}.create-grid textarea{grid-column:1/-1}.hidden{display:none!important}
    @media(max-width:760px){.kpis,.grid,.create-grid{grid-template-columns:1fr}.create-grid textarea{grid-column:auto}}
  </style>
</head>
<body>
<header><div class="head"><div><h1>変更注文・締め管理</h1><div>未承認COと未承認支払通知書をゼロにしてから締めます</div></div><nav><a href="工事リスト.html">一覧メニュー</a><a href="支払通知書.html">支払通知書</a></nav><div id="userBox"></div></div></header>
<section id="loginCard" class="login-card"><h2>社員ログイン</h2><label>メールアドレス<input id="email" type="email"></label><label>パスワード<input id="password" type="password"></label><button class="btn primary" onclick="signIn()">ログイン</button><div id="loginStatus" class="status"></div></section>
<main id="app" class="hidden">
  <section class="kpis"><div id="coKpi" class="kpi"><span>未承認CO</span><strong id="coCount">0</strong><small>requested の変更注文</small></div><div id="noticeKpi" class="kpi"><span>未承認支払通知書</span><strong id="noticeCount">0</strong><small>draft / sent / disputed / agreed</small></div></section>
  <section class="panel"><div class="toolbar"><h2>変更申請</h2><button class="btn secondary" onclick="loadAll()">更新</button></div><div class="create-grid"><select id="poSelect"><option value="">発注書を選択</option></select><input id="reason" placeholder="追加・変更理由（必須）"><input id="amount" inputmode="numeric" placeholder="増減金額（減額はマイナス）"><textarea id="detail" placeholder="作業内容・数量・現場状況"></textarea></div><div class="toolbar"><button class="btn primary" onclick="createCo()">社員申請を登録</button><button id="vendorLinkButton" class="btn secondary" onclick="copyVendorLink()">業者申請URLをコピー</button><span id="createStatus" class="status"></span></div></section>
  <div class="grid"><section class="panel"><h2>未承認CO</h2><div class="table-scroll"><table><thead><tr><th>CO番号</th><th>発注番号</th><th>理由</th><th>金額</th><th>申請者</th><th>処理</th></tr></thead><tbody id="coBody"></tbody></table></div></section><section class="panel"><h2>未承認支払通知書</h2><div class="table-scroll"><table><thead><tr><th>通知番号</th><th>業者</th><th>発行日</th><th>金額</th><th>状態</th></tr></thead><tbody id="noticeBody"></tbody></table></div></section></div>
  <div id="globalStatus" class="status"></div>
</main>
<script>
const db=window.supabase.createClient('https://jjowjnrsknmakcunblzq.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impqb3dqbnJza25tYWtjdW5ibHpxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyNzY4MjUsImV4cCI6MjA5OTg1MjgyNX0.XYPEt90GQlzJMTe67f9O7WExNYrJhfQ_HC20kkCWgGs');
const $=id=>document.getElementById(id),esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),yen=v=>'¥'+Math.round(Number(v)||0).toLocaleString('ja-JP');
let orders=[],changeOrders=[],notices=[],isAdmin=false,pendingCoCount=0,pendingNoticeCount=0;
const setStatus=(id,text,error=false)=>{$(id).textContent=text;$(id).className='status '+(error?'error':'')};
async function signIn(){setStatus('loginStatus','確認中…');const result=await db.auth.signInWithPassword({email:$('email').value.trim(),password:$('password').value});if(result.error)return setStatus('loginStatus',result.error.message,true);await ready(result.data.session)}
async function ready(session){if(!session){$('loginCard').classList.remove('hidden');$('app').classList.add('hidden');return}const enabled=await db.rpc('is_current_app_user_enabled');if(enabled.error||enabled.data!==true){await db.auth.signOut();return ready(null)}isAdmin=(await db.rpc('is_management_admin')).data===true;$('userBox').innerHTML=`${esc(session.user.email)} <button class="btn secondary" onclick="db.auth.signOut().then(()=>location.reload())">ログアウト</button>`;$('loginCard').classList.add('hidden');$('app').classList.remove('hidden');await loadAll()}
async function loadAll(){
  setStatus('globalStatus','集計中…');const [poResult,coResult,noticeResult,coCountResult,noticeCountResult]=await Promise.all([
    db.from('purchase_orders').select('id,po_no,status,vendor_id,management_number,work_name,vendors(name)').in('status',['issued','acknowledged','in_progress']).is('deleted_at',null).order('po_no'),
    db.from('change_orders').select('id,co_no,po_id,reason,detail,amount,status,revision,requested_by_type,purchase_orders(po_no)').eq('status','requested').is('deleted_at',null).order('created_at').limit(200),
    db.from('payment_notices').select('id,status,vendor_name_snapshot,issue_date,total_snapshot,payment_notice_groups(notice_no)').in('status',['draft','sent','disputed','agreed']).is('deleted_at',null).order('created_at').limit(200),
    db.from('change_orders').select('id',{count:'exact',head:true}).eq('status','requested').is('deleted_at',null),
    db.from('payment_notices').select('id',{count:'exact',head:true}).in('status',['draft','sent','disputed','agreed']).is('deleted_at',null)
  ]);const error=poResult.error||coResult.error||noticeResult.error||coCountResult.error||noticeCountResult.error;if(error)return setStatus('globalStatus',/does not exist|schema cache|could not find/i.test(error.message)?'変更注文・支払通知書DBは安全確認後に適用予定です。既存データは変更していません。':error.message,true);
  orders=poResult.data||[];changeOrders=coResult.data||[];notices=noticeResult.data||[];pendingCoCount=Number(coCountResult.count||0);pendingNoticeCount=Number(noticeCountResult.count||0);$('poSelect').innerHTML='<option value="">発注書を選択</option>'+orders.map(po=>`<option value="${po.id}">${esc(po.po_no)}｜${esc(po.vendors?.name||'')}｜${esc(po.work_name||po.management_number)}</option>`).join('');$('vendorLinkButton').disabled=!isAdmin;render();setStatus('globalStatus',`最新状態へ更新しました。件数は全件集計、明細は各200件まで表示します。`)
}
function render(){
  $('coCount').textContent=pendingCoCount;$('noticeCount').textContent=pendingNoticeCount;$('coKpi').className='kpi '+(pendingCoCount?'warn':'ok');$('noticeKpi').className='kpi '+(pendingNoticeCount?'warn':'ok');
  $('coBody').innerHTML=changeOrders.length?changeOrders.map((co,index)=>`<tr><td>${esc(co.co_no)}</td><td>${esc(co.purchase_orders?.po_no||'')}</td><td>${esc(co.reason)}</td><td class="num">${yen(co.amount)}</td><td>${co.requested_by_type==='vendor'?'業者':'社員'}</td><td><div class="row-actions">${isAdmin?`<button class="btn primary" onclick="decide(${index},'approved')">承認</button><button class="btn danger" onclick="decide(${index},'rejected')">却下</button>`:'決裁待ち'}</div></td></tr>`).join(''):'<tr><td colspan="6">未承認COはありません。</td></tr>';
  $('noticeBody').innerHTML=notices.length?notices.map(n=>`<tr><td>${esc(n.payment_notice_groups?.notice_no||'')}</td><td>${esc(n.vendor_name_snapshot)}</td><td>${esc(n.issue_date)}</td><td class="num">${yen(n.total_snapshot)}</td><td>${esc(n.status)}</td></tr>`).join(''):'<tr><td colspan="5">未承認支払通知書はありません。</td></tr>';
}
async function createCo(){const poId=$('poSelect').value,reason=$('reason').value.trim(),amountText=String($('amount').value).replace(/[,，¥￥\s]/g,''),amount=Number(amountText);if(!poId||!reason||amountText===''||!Number.isFinite(amount))return setStatus('createStatus','発注書・理由・増減金額を入力してください。減額はマイナスで入力できます。',true);const result=await db.rpc('create_staff_change_order',{p_po_id:poId,p_reason:reason,p_detail:$('detail').value.trim(),p_amount:amount,p_tax_rate:.1});if(result.error)return setStatus('createStatus',result.error.message,true);$('reason').value='';$('amount').value='';$('detail').value='';setStatus('createStatus','変更申請を登録しました。');await loadAll()}
async function copyVendorLink(){const poId=$('poSelect').value;if(!poId||!isAdmin)return setStatus('createStatus','発注書を選択してください。',true);const result=await db.rpc('create_change_order_access_token',{p_po_id:poId,p_valid_hours:720});if(result.error)return setStatus('createStatus',result.error.message,true);const url=new URL('業者変更申請.html',location.href);url.hash='token='+encodeURIComponent(result.data);try{await navigator.clipboard.writeText(url.href);setStatus('createStatus','30日有効の業者申請URLをコピーしました。')}catch{prompt('このURLを業者へ送ってください。',url.href)}}
async function decide(index,decision){const co=changeOrders[index];if(!co||!isAdmin)return;let reason=null;if(decision==='rejected'){reason=prompt('却下理由を入力してください。');if(!reason?.trim())return}const result=await db.rpc('decide_change_order',{p_co_id:co.id,p_expected_revision:co.revision,p_decision:decision,p_reason:reason});if(result.error)return setStatus('globalStatus',result.error.message,true);await loadAll()}
db.auth.getSession().then(({data})=>ready(data.session));db.auth.onAuthStateChange((_event,session)=>{if(!session)ready(null)});
</script>
</body></html>
